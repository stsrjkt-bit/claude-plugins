<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150">
  <!-- 曲がりくねった道（S字カーブ） -->
  <path
    d="M 30 120 C 30 80, 80 100, 75 75 S 120 70, 120 30"
    stroke="#ccfbf1"
    stroke-width="12"
    fill="none"
    stroke-linecap="round"
  />

  <!-- 直線の道（破線） -->
  <line
    x1="30" y1="120"
    x2="120" y2="30"
    stroke="#0d9488"
    stroke-width="4"
    stroke-dasharray="8 4"
  />

  <!-- 鉛筆グループ（-45度、中心(115,35)付近） -->
  <g transform="rotate(-45, 115, 35)">
    <!-- 鉛筆の軸 -->
    <rect
      x="112" y="21"
      width="6" height="28"
      fill="#4a4a4a"
    />
    <!-- 先端三角形（軸の下に配置） -->
    <polygon
      points="112,49 118,49 115,57"
      fill="#0d9488"
    />
    <!-- 消しゴム部分（軸の上端） -->
    <rect
      x="112" y="15"
      width="6" height="6"
      fill="#fefcf7"
    />
  </g>
</svg>
