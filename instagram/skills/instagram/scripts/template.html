<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; }

  .container {
    width: 1080px;
    height: 1080px;
    background: #fcf9f2;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 68px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* Background decorations — colors injected by render.mjs */
  .deco-top-right {
    position: absolute;
    top: 0; right: 0;
    width: 340px; height: 340px;
    border-bottom-left-radius: 100%;
    opacity: 0.6;
  }
  .deco-bottom-left {
    position: absolute;
    bottom: 60px; left: 40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    opacity: 0.8;
  }

  /* Eyecatch SVG area */
  .eyecatch {
    position: absolute;
    right: 56px;
    top: 180px;
    width: 300px;
    height: 300px;
    opacity: 0.7;
    z-index: 5;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 80px;
    position: relative;
    z-index: 10;
  }
  .month-label {
    font-family: 'Lexend', sans-serif;
    font-size: 24px;
    letter-spacing: 5px;
    background: rgba(90,84,75,0.1);
    color: #5a544b;
    padding: 12px 32px;
    border-radius: 999px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .brand {
    font-family: 'Lexend', sans-serif;
    font-size: 22px;
    font-weight: 500;
    opacity: 0.35;
    letter-spacing: 4px;
    color: #5a544b;
    text-transform: uppercase;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .date-icon {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
  }
  .date-icon .emoji { font-size: 40px; }
  .date-icon .date {
    font-family: 'Lexend', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: #a09890;
    letter-spacing: 5px;
  }

  .headline {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.2;
    color: #3a352e;
    margin-bottom: 36px;
    letter-spacing: -1px;
  }

  .subhead-wrap {
    display: inline-block;
    position: relative;
    margin-bottom: 50px;
  }
  .subhead-text {
    position: relative;
    z-index: 1;
    font-size: 32px;
    font-weight: 700;
    color: #4a453e;
    padding: 0 4px;
  }
  /* Highlight bar under subhead — color injected by render.mjs */
  .subhead-highlight {
    position: absolute;
    bottom: 2px; left: 0;
    width: 100%; height: 14px;
    z-index: 0;
  }

  /* Body box */
  .body-box {
    background: rgba(255,255,255,0.85);
    padding: 44px 44px 44px 56px;
    border-radius: 28px;
    border: 2px solid #efeadd;
    position: relative;
    overflow: hidden;
  }
  .body-accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 10px;
  }
  .body-text {
    font-size: 34px;
    line-height: 2;
    color: #6c665e;
    white-space: pre-wrap;
  }

  /* Footer */
  .footer {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 28px;
    padding-top: 36px;
    position: relative;
    z-index: 10;
  }
  .footer-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #8c867a;
  }
  .footer-line {
    width: 80px; height: 2px;
    background: #8c867a;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="deco-top-right" id="deco-top"></div>
    <div class="deco-bottom-left" id="deco-bottom"></div>
    <div class="header">
      <span class="month-label" id="month-label"></span>
      <span class="brand">Satou Math Academy</span>
    </div>
    <div class="eyecatch" id="eyecatch"></div>
    <div class="content">
      <div class="date-icon">
        <span class="emoji" id="icon"></span>
        <span class="date" id="date"></span>
      </div>
      <div class="headline" id="headline"></div>
      <div class="subhead-wrap">
        <span class="subhead-text" id="subhead"></span>
        <div class="subhead-highlight" id="subhead-highlight"></div>
      </div>
      <div class="body-box">
        <div class="body-accent-bar" id="accent-bar"></div>
        <p class="body-text" id="body"></p>
      </div>
    </div>
    <div class="footer">
      <span class="footer-name">さとう数理塾</span>
      <div class="footer-line"></div>
    </div>
  </div>
</body>
</html>
